<!DOCTYPE html>

<html>

<head>

<title>InvoiceFlow</title>

<link rel="stylesheet" href="/static/css/style.css">


<style>


body{

background:#090d18;

}



.hero{

min-height:90vh;

display:flex;

align-items:center;

justify-content:space-between;

padding:70px 120px;

gap:50px;

}





.hero-left{

width:45%;

}



.hero-left h1{


font-size:70px;

line-height:1.1;

margin-bottom:25px;

}



.hero-left h1 span{

color:#00e5ff;

}




.hero-left p{


font-size:20px;

color:#aab1c5;

line-height:1.7;

margin-bottom:35px;

}





.start-btn{


display:inline-block;

background:#f5f7ff;

color:#111;

padding:16px 40px;

border-radius:10px;

text-decoration:none;

font-weight:bold;

font-size:18px;

transition:.3s;

}



.start-btn:hover{

transform:scale(1.05);

}






.badges{


margin-top:30px;

background:#151b30;

padding:14px 20px;

border-radius:12px;

display:inline-block;

color:#aaa;

}







.invoice-preview{


width:520px;

background:#151b30;

padding:35px;

border-radius:25px;

box-shadow:0 30px 80px black;

}





.preview-title{


display:flex;

gap:8px;

margin-bottom:25px;

}



.dot{

height:12px;

width:12px;

background:#ff5f57;

border-radius:50%;

}



.dot:nth-child(2){

background:#ffbd2e;

}



.dot:nth-child(3){

background:#28c840;

}





.invoice-preview h3{

margin-bottom:30px;

color:#aaa;

}





.status{


display:flex;

align-items:center;

gap:15px;

margin:25px 0;

color:#d5d8e5;

}



.tick{

color:#00e5ff;

font-size:22px;

}




.generate{


margin-top:35px;

display:flex;

gap:15px;

}




.generate button{


padding:14px 22px;

border-radius:10px;

border:none;

cursor:pointer;

}



.primary{

background:#00e5ff;

}



.secondary{

background:#222a43;

color:white;

}





@media(max-width:900px){


.hero{

flex-direction:column;

padding:40px;

}



.hero-left{

width:100%;

}



.invoice-preview{

width:100%;

}


}



</style>



</head>




<body>






<nav class="navbar">


<div class="logo">

InvoiceFlow

</div>






</nav>









<section class="hero">





<div class="hero-left">





<h1>

From details

<br>

to <span>invoice</span>


</h1>







<p>

The best way to generate GST-compliant invoices.
Enter details, review, and download.

</p>






<a href="/supplier" class="start-btn">

Get Started

</a>







<div class="badges">

⚡ Quick &nbsp; • &nbsp; Simple &nbsp; • &nbsp; Compliant

</div>






</div>









<div class="invoice-preview">





<div class="preview-title">


<div class="dot"></div>

<div class="dot"></div>

<div class="dot"></div>



</div>





<h3>

Invoice Generator

</h3>







<div class="status">

<span class="tick">✓</span>

Supplier details configured

</div>





<div class="status">

<span class="tick">✓</span>

Client information added

</div>







<div class="status">

<span class="tick">⚡</span>

GST calculation: CGST + SGST

</div>






<div class="status">

<span class="tick">▣</span>

Invoice ready

</div>








<div class="generate">


<button class="primary">

Generate Invoice

</button>


<button class="secondary">

Download PDF

</button>


<button class="secondary">

History

</button>


</div>







</div>







</section>







</body>


</html>
